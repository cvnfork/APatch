name: Build Manager

on:
  push:
    tags: [ "*" ]
    branches: [ "miuix" ]
    paths:
      - '.github/workflows/build.yml'
      - 'app/**'
      - 'apd/**'
      - 'build.gradle.kts'
      - 'gradle/libs.versions.toml'
  pull_request:
    branches: [ "miuix" ]
    paths:
      - '.github/workflows/build.yml'
      - 'app/**'
      - 'apd/**'
      - 'build.gradle.kts'
      - 'gradle/libs.versions.toml'
  workflow_call:
  workflow_dispatch:

jobs:
  build-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version
        id: parse_version
        run: |
          COMMIT_NUM=$(git rev-list --count HEAD)
          VERSION=$(echo "$COMMIT_NUM + 200 + 10000" | bc)
          echo "Generated Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install toolchain
        run: |
          rustup update stable
          cargo install cargo-ndk --locked || true
          rustup target install aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apd
          cache-targets: false

      - name: Write key
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "KEYSTORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> gradle.properties
            echo "KEY_ALIAS=${{ secrets.ALIAS }}" >> gradle.properties
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
            echo "KEYSTORE_FILE=key.jks" >> gradle.properties
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > key.jks
          fi

      - name: Build with Gradle
        run: |
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.vfs.watch=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "android.native.buildOutput=verbose" >> gradle.properties
          sed -i '/org.gradle.configuration-cache/d' gradle.properties
          ./gradlew assembleRelease

      - name: Upload mappings
        uses: actions/upload-artifact@v5
        with:
          name: "mappings"
          path: "app/build/outputs/mapping/release/"

      - name: Post to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          TITLE: "Manager v${{ steps.parse_version.outputs.VERSION }}"
          BRANCH: ${{ github.ref_name }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          python3 .github/scripts/telegram_bot.py "${{ secrets.CHANNEL_ID }}" "$APK_PATH"